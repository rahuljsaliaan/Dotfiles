# ==============================
# WINDOW
# ==============================
[window]
opacity = 0.95
decorations = "full"
blur = true

# Good rectangular launch size (not square)
dimensions = { columns = 85, lines = 25 }

padding = { x = 12, y = 10 }

# ==============================
# FONT
# ==============================
[font]
size = 11

[font.normal]
family = "Hack Nerd Font"
# Using the "Bold" style forces the thicker, heavier weight for normal characters
style = "Bold"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

# ==============================
# CURSOR
# ==============================
[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 600

# ==============================
# SCROLLING
# ==============================
[scrolling]
history = 10000
multiplier = 3

# ==============================
# SELECTION
# ==============================
[selection]
save_to_clipboard = true

# ==============================
# MOUSE
# ==============================
[mouse]
hide_when_typing = true

# ==============================
# COLORS (Tokyo Night inspired)
# ==============================
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black = "#15161e"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#a9b1d6"

[colors.bright]
black = "#414868"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#c0caf5"

# ==============================
# KEYBOARD
# ==============================
[keyboard]

# Paste (Ctrl+Shift+V)
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

# Copy (Ctrl+Shift+C)
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

# --- Keyboard Scrolling ---
[[keyboard.bindings]]
key = "PageUp"
mods = "Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key = "PageDown"
mods = "Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key = "Home"
mods = "Shift"
action = "ScrollToTop"

[[keyboard.bindings]]
key = "End"
mods = "Shift"
action = "ScrollToBottom"

# ==============================
# ENV (fix some rendering issues)
# ==============================
[env]
TERM = "xterm-256color"
